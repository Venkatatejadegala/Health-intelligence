name: Continuous Integration

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  frontend:
    name: Frontend Quality Assurance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Vitest Unit Tests
        run: npm run test

      - name: Run Production Compile Check
        run: npm run build

  backend:
    name: Backend Quality Assurance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Cache MongoDB Memory Server Binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-mongodb-binaries-${{ hashFiles('backend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-mongodb-binaries-

      - name: Install Dependencies
        run: npm ci

      - name: Run Jest Integration Tests
        env:
          NODE_ENV: test
          JWT_SECRET: dummy_jwt_secret_token_for_ci_builds
          MONGODB_URI: mongodb://localhost:27017/dummy_ci_database_connection
          MONGOMS_VERSION: 6.0.14
        run: |
          npm run test > test-results.log 2>&1 || (cat test-results.log && exit 1)

      - name: Upload Test Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jest-test-logs
          path: backend/test-results.log

  ml-microservice:
    name: ML Microservice Quality Assurance
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-microservice

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies & Test Packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Run Pytest Suite
        run: pytest
